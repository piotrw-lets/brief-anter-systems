<!DOCTYPE html>
<html class="staticrypt-html" lang="pl">
    <head>
        <meta charset="utf-8" />
        <title>Dostęp chroniony — Let's Automate</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

        <style>
            :root{
                --dark:#0a0a0a; --accent:#00CD77; --accent-2:#00D294; --accent-deep:#008138;
                --accent-soft:#00cd771a; --card:#ffffff; --ink:#0a0a0a; --muted:#6a7282;
                --line:#ececec; --font:'Urbanist',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            }
            *{box-sizing:border-box}
            .staticrypt-html{height:100%}
            .staticrypt-body{
                height:100%;margin:0;font-family:var(--font);
                background:linear-gradient(135deg,#0a0a0a 0%,#0d1a14 40%,#0a1f16 70%,#0a0a0a 100%);
                -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;position:relative;overflow:hidden;
            }
            .staticrypt-body::before{content:"";position:absolute;right:-160px;top:-180px;width:460px;height:460px;background:radial-gradient(circle,#00cd7726 0%,#0000 70%);pointer-events:none}
            .staticrypt-body::after{content:"";position:absolute;left:-160px;bottom:-200px;width:420px;height:420px;background:radial-gradient(circle,#00cd7714 0%,#0000 70%);pointer-events:none}

            .staticrypt-content{height:100%}
            .staticrypt-page{
                min-height:100%;display:flex;align-items:center;justify-content:center;
                padding:24px;position:relative;z-index:1;
            }
            .staticrypt-form{
                background:var(--card);width:100%;max-width:430px;border-radius:28px;
                padding:40px 36px;text-align:center;
                box-shadow:0 30px 70px -20px rgba(0,0,0,.55),0 8px 24px -12px rgba(0,0,0,.4);
                position:relative;overflow:hidden;
            }
            .staticrypt-form::before{content:"";position:absolute;left:50%;top:-90px;transform:translateX(-50%);width:320px;height:200px;background:radial-gradient(circle,#00cd7714 0%,#0000 70%);pointer-events:none}

            .sc-brand{position:relative;display:inline-flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
            .sc-la{font-weight:800;letter-spacing:-.04em;font-size:18px;color:var(--ink)}
            .sc-x{color:#c3c9d0;font-weight:600;font-size:16px;line-height:1}
            .sc-anter{display:inline-flex;align-items:center}
            .sc-anter svg{height:18px;width:auto;display:block}
            .sc-lock{position:relative;width:60px;height:60px;border-radius:18px;margin:22px auto 0;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);border:1px solid #00cd7733}
            .sc-lock svg{width:26px;height:26px;color:var(--accent-deep)}

            .staticrypt-instructions{position:relative;margin-top:18px}
            .staticrypt-title{font-size:22px;font-weight:700;letter-spacing:-.03em;color:var(--ink);margin:0}
            .staticrypt-instructions p:last-child{margin:8px 0 0;font-size:14.5px;color:var(--muted);font-weight:500;line-height:1.5}

            .staticrypt-hr{display:none}

            form#staticrypt-form{position:relative;margin-top:24px}
            .staticrypt-password-container{position:relative;margin:0 0 14px}
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"]{
                width:100%;font-family:var(--font);font-size:15px;font-weight:500;color:var(--ink);
                background:#fff;border:1.5px solid var(--line);border-radius:14px;
                padding:14px 46px 14px 16px;outline:0;transition:border-color .2s,box-shadow .2s;
            }
            .staticrypt-form input::placeholder{color:#99a1af;font-weight:500}
            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
            .staticrypt-toggle-password-visibility{cursor:pointer;height:20px;width:20px;opacity:.55;padding:0;position:absolute;right:15px;top:50%;transform:translateY(-50%)}
            .staticrypt-toggle-password-visibility:hover{opacity:.8}

            label.staticrypt-remember{display:flex;align-items:center;gap:10px;margin:0 0 16px;font-size:13.5px;font-weight:500;color:var(--muted);text-align:left;cursor:pointer}
            .staticrypt-remember input[type="checkbox"]{width:17px;height:17px;accent-color:var(--accent);transform:none;margin:0;cursor:pointer}

            .staticrypt-form .staticrypt-decrypt-button{
                width:100%;border:0;border-radius:14px;padding:15px;cursor:pointer;
                font-family:var(--font);font-weight:700;font-size:16px;letter-spacing:-.01em;
                text-transform:none;color:var(--dark);background:var(--accent);
                box-shadow:0 4px 16px #00cd7733;transition:transform .25s cubic-bezier(.16,1,.3,1),box-shadow .25s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover{transform:translateY(-2px);box-shadow:0 8px 30px #00cd774d}
            .staticrypt-form .staticrypt-decrypt-button:active{transform:translateY(0)}

            .sc-foot{position:relative;margin-top:20px;font-size:12px;color:var(--muted);font-weight:500}

            .hidden{display:none !important}

            .staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center}
            .staticrypt-spinner{display:inline-block;width:2.2rem;height:2.2rem;border:.25em solid rgba(255,255,255,.25);border-right-color:var(--accent);border-radius:50%;animation:staticrypt-spin .75s linear infinite}
            @keyframes staticrypt-spin{100%{transform:rotate(360deg)}}

            @media screen and (-webkit-min-device-pixel-ratio:0){
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"]{font-size:16px}
            }
        </style>
    </head>
